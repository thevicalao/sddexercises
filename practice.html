<!DOCTYPE html>
<html>
    <head>
        <title>Buttons</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="first-set">
            <div class="pagination">
            <h3>Pagination</h3>
            <button style="margin-right: 12px;">Back</button>
            <a href="">1</a>
            <a href="">2</a>
            <a href="">3</a>
            <a href="">4</a>
            <a href="">5</a>
            <button style="margin-left: 12px;">Next</button>
        </div>
        <div class="stretch">
            <h3>Stretch</h3>
            <button>Stretch</button>
        </div>
        <div class="shadow">
            <h3>3D Click</h3>
            <button>Shadow</button>
        </div>
        <div class="m_and_p">
            <h3>Margin and padding togetther</h3>
            <button>One</button>
            <button>Two</button>
            <button>Three</button>
        </div>
        </div>
        <div class="second-set-textboxes">
            <hr>
            <div>
                <h3>7d with rounded corners</h3>
                <input type="text" placeholder="Search" class="rc">
            </div>
            <div>
                <h3>With a shadow, and no border</h3>
                <input type="text" placeholder="Search Google or type a URL" class="google">
            </div>
            <div>
                <h3>LinkedIn signup</h3>
                <label for="email">Email</label><br>
                <input type="text" id="email" class="linkedin">
                <p>By clicking Agree & Join, you agree to the Privacy Policy.</p>
            </div>
            <div class="x">
                <img src="https://cdn.britannica.com/70/234870-050-D4D024BB/Orange-colored-cat-yawns-displaying-teeth.jpg">
                <input type="text" placeholder="What's happening?">
                <button>Tweet</button>
            </div>
        </div>
    </body>
</html>
